services:
  postgres:
    image: postgres:15
    container_name: ui-trainer-db
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ui_trainer}
      - POSTGRES_USER=${POSTGRES_USER:-trainer}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trainer123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-trainer} -d ${POSTGRES_DB:-ui_trainer}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    environment:
      - REACT_APP_API_BASE_URL=${REACT_APP_API_BASE_URL:-http://localhost:8080}
      - HOST=0.0.0.0
      - PORT=5173
      - BROWSER=none
      - CI=false
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - '${BACKEND_PORT:-8080}:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ui_trainer}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-trainer}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-trainer123}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      - RUNNER_DEFAULT_BASE_URL=http://frontend:5173
      - BASE_URL=http://frontend:5173
      - FRONTEND_URL=http://frontend:5173
      - DOCKER_FRONTEND_URL=http://frontend:5173
      - JWT_SECRET=${JWT_SECRET:-YourSecretKeyForJWTTokenGenerationMustBeLongEnough2024}
      - JWT_ACCESS_TOKEN_EXPIRATION_MINUTES=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      - JWT_REFRESH_TOKEN_EXPIRATION_DAYS=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      - SELENIDE_HEADLESS=${SELENIDE_HEADLESS:-true}
      - SELENIDE_BROWSER_SIZE=${SELENIDE_BROWSER_SIZE:-1280x720}
      - SELENIDE_TIMEOUT=${SELENIDE_TIMEOUT:-10000}
      - SELENIDE_PAGE_LOAD_TIMEOUT=${SELENIDE_PAGE_LOAD_TIMEOUT:-20000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
